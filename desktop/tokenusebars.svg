  <!-- Gradient bars retained -->
  <rect x="272" y="520" width="80" height="280" rx="16" fill="url(#barGradient)"/>
  <rect x="392" y="400" width="80" height="400" rx="16" fill="url(#barGradient)"/>
  <rect x="512" y="240" width="80" height="560" rx="16" fill="url(#barGradient)"/>
  <rect x="632" y="360" width="80" height="440" rx="16" fill="url(#barGradient)"/>
