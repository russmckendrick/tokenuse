name: "Linux build dependencies"
description: "Install the apt packages required to build tokenuse on Linux runners."

inputs:
  profile:
    description: >-
      Which dependency set to install:
      'core' (CLI build), 'desktop' (Tauri build),
      or 'desktop-bundle' (Tauri build + AppImage/deb/rpm packaging).
    required: false
    default: "core"

runs:
  using: "composite"
  steps:
    - name: "🐧 Install Linux build dependencies"
      if: runner.os == 'Linux'
      shell: bash
      run: |
        set -euo pipefail
        sudo apt-get update

        # Core CLI build: fontconfig for plotters, dbus for the keyring/quota-sync path.
        packages=(libfontconfig1-dev libdbus-1-dev)

        # Tauri desktop build adds the GTK/WebKit stack.
        if [ "${{ inputs.profile }}" != "core" ]; then
          packages+=(
            libayatana-appindicator3-dev
            libgtk-3-dev
            libssl-dev
            libwebkit2gtk-4.1-dev
            libxdo-dev
            librsvg2-dev
          )
        fi

        # Release bundling (AppImage/deb/rpm) needs the packaging toolchain too.
        if [ "${{ inputs.profile }}" = "desktop-bundle" ]; then
          packages+=(
            build-essential
            curl
            file
            libfuse2
            patchelf
            rpm
            wget
          )
        fi

        sudo apt-get install -y "${packages[@]}"
