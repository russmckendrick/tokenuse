name: Update WinGet

on:
  workflow_call:
    inputs:
      release_tag:
        required: false
        type: string
    outputs:
      pull_request_url:
        description: URL of the WinGet pull request created for this release.
        value: ${{ jobs.update-winget.outputs.pull_request_url }}
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to submit. Defaults to the latest GitHub release.
        required: false
        type: string

permissions:
  contents: read

jobs:
  update-winget:
    name: Update WinGet package
    runs-on: windows-latest
    outputs:
      pull_request_url: ${{ steps.pr.outputs.url }}

    steps:
      - name: Validate WinGet token
        shell: pwsh
        env:
          EXPECTED_FORK_USER: ${{ github.repository_owner }}
          WINGET_TOKEN: ${{ secrets.WINGET_CREATE_GITHUB_TOKEN }}
        run: |
          if (-not $env:WINGET_TOKEN) {
            throw "Missing WINGET_CREATE_GITHUB_TOKEN secret."
          }

          $headers = @{
            Authorization = "Bearer $env:WINGET_TOKEN"
            "X-GitHub-Api-Version" = "2022-11-28"
          }

          $response = Invoke-WebRequest -Headers $headers -Uri "https://api.github.com/user"
          $scopes = $response.Headers["X-OAuth-Scopes"]
          $viewer = $response.Content | ConvertFrom-Json

          if (-not $scopes) {
            throw "WINGET_CREATE_GITHUB_TOKEN must be a classic PAT with public_repo scope. Fine-grained PATs are not supported by vedantmgoyal9/winget-releaser."
          }

          if ($scopes -notmatch '(^|,\s*)(public_repo|repo)(,|$)') {
            throw "WINGET_CREATE_GITHUB_TOKEN must include public_repo scope. Current scopes: $scopes"
          }

          if (-not $viewer.login) {
            throw "Unable to determine the GitHub user behind WINGET_CREATE_GITHUB_TOKEN."
          }

          $forkRepository = "$env:EXPECTED_FORK_USER/winget-pkgs"
          $fork = Invoke-RestMethod -Headers $headers -Uri "https://api.github.com/repos/$forkRepository"

          if (-not $fork.fork) {
            throw "Expected '$forkRepository' to be a fork of microsoft/winget-pkgs, but GitHub does not mark it as a fork."
          }

          if (-not $fork.parent -or $fork.parent.full_name -ne "microsoft/winget-pkgs") {
            throw "Expected '$forkRepository' to fork microsoft/winget-pkgs, but GitHub reports parent '$($fork.parent.full_name)'."
          }

          if ($fork.PSObject.Properties.Name -contains "permissions") {
            $hasWriteAccess = $fork.permissions.admin -or $fork.permissions.maintain -or $fork.permissions.push

            if (-not $hasWriteAccess) {
              throw "Token user '$($viewer.login)' does not have write access to '$forkRepository'."
            }
          }

          Write-Host "Validated classic PAT scopes for WinGet submission: $scopes"
          Write-Host "Token user: $($viewer.login)"
          Write-Host "WinGet fork: $forkRepository"

      - name: Resolve release tag
        id: version
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ inputs.release_tag }}"

          if (-not $tag) {
            $headers = @{
              Authorization = "Bearer $env:GH_TOKEN"
              "X-GitHub-Api-Version" = "2022-11-28"
            }
            $release = Invoke-RestMethod -Headers $headers -Uri "https://api.github.com/repos/${{ github.repository }}/releases/latest"
            $tag = $release.tag_name
          }

          if (-not $tag) {
            throw "Unable to determine the release tag to submit to WinGet."
          }

          "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Submit WinGet package update
        uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: RussMckendrick.Tokenuse
          fork-user: ${{ github.repository_owner }}
          installers-regex: '\.exe$'
          release-tag: ${{ steps.version.outputs.tag }}
          token: ${{ secrets.WINGET_CREATE_GITHUB_TOKEN }}

      - name: Resolve WinGet pull request URL
        id: pr
        if: success()
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $identifier = "RussMckendrick.Tokenuse"
          $forkUser = "${{ github.repository_owner }}"
          $tag = "${{ steps.version.outputs.tag }}"
          $version = $tag.TrimStart("v")
          $query = "repo:microsoft/winget-pkgs is:pr author:$forkUser in:title `"$identifier version $version`""
          $headers = @{
            Authorization = "Bearer $env:GH_TOKEN"
            "X-GitHub-Api-Version" = "2022-11-28"
          }
          $encodedQuery = [uri]::EscapeDataString($query)
          $result = Invoke-RestMethod -Headers $headers -Uri "https://api.github.com/search/issues?q=$encodedQuery&sort=created&order=desc&per_page=10"
          $pr = $result.items | Select-Object -First 1

          if (-not $pr -or -not $pr.html_url) {
            "url=" >> $env:GITHUB_OUTPUT
            "## WinGet Submission`n`nPull request URL could not be resolved automatically." | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
            Write-Host "WinGet pull request URL could not be resolved automatically."
            exit 0
          }

          "url=$($pr.html_url)" >> $env:GITHUB_OUTPUT
          "## WinGet Submission`n`n- Pull request: [$($pr.html_url)]($($pr.html_url))" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          Write-Host "Resolved WinGet pull request URL: $($pr.html_url)"
