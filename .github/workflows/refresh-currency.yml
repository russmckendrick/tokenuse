name: "💱 Generate currency JSON"

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    name: "💾 Generate and commit snapshot"
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: "📥 Check out repository"
        uses: actions/checkout@v6

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfontconfig1-dev

      - name: "🦀 Install Rust toolchain"
        uses: dtolnay/rust-toolchain@stable

      - name: "⚡ Restore Rust cache"
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: currency-json

      - name: "🌍 Generate currency JSON"
        run: cargo run --features refresh-currency -- --generate-currency-json

      - name: "🚀 Commit updated snapshot"
        run: |
          if git diff --quiet -- currency/rates.json; then
            echo "currency/rates.json unchanged"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add currency/rates.json
          git commit -m "Update currency rates"
          git push
