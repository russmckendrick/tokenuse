name: Refresh currency rates

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Refresh currency rates
        run: cargo run --features refresh-currency -- --refresh-currency

      - name: Commit updated snapshot
        run: |
          if git diff --quiet -- currency/rates.json; then
            echo "currency/rates.json unchanged"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add currency/rates.json
          git commit -m "Update currency rates"
          git push
