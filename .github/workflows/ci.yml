name: CI

on:
  push:
    branches: [main]
    tags:
      - 'v*'
    paths-ignore:
      - 'docs/**'
      - 'AGENTS.md'
      - 'README.md'
      - 'DESIGN.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'AGENTS.md'
      - 'README.md'
      - 'DESIGN.md'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfontconfig1-dev

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Check compilation
        run: cargo check

      - name: Lint
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test

  build:
    name: Build (${{ matrix.artifact }})
    needs: check
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: tokenuse-linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            artifact: tokenuse-linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: tokenuse-darwin-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: tokenuse-darwin-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: tokenuse-windows-amd64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfontconfig1-dev

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary (Unix)
        if: matrix.os != 'windows-latest'
        run: cp target/${{ matrix.target }}/release/tokenuse ${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: matrix.os == 'windows-latest'
        run: cp target/${{ matrix.target }}/release/tokenuse.exe ${{ matrix.artifact }}

      - name: Generate checksum (Unix)
        if: matrix.os != 'windows-latest'
        run: shasum -a 256 ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256

      - name: Generate checksum (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $hash = (Get-FileHash -Algorithm SHA256 ${{ matrix.artifact }}).Hash.ToLower()
          "$hash  ${{ matrix.artifact }}" | Out-File -Encoding ascii ${{ matrix.artifact }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.sha256

  release:
    name: Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Collect release files
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: release/*
          draft: false
          prerelease: false
          generate_release_notes: true

  update-tap:
    name: Update Homebrew Tap
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    uses: ./.github/workflows/update-tap.yml
    with:
      release_tag: ${{ github.ref_name }}
    secrets: inherit

  update-winget:
    name: Update WinGet package
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    uses: ./.github/workflows/update-winget.yml
    with:
      release_tag: ${{ github.ref_name }}
    secrets: inherit

  release-summary:
    name: Release Summary
    needs: [release, update-tap, update-winget]
    if: startsWith(github.ref, 'refs/tags/v') && always()
    runs-on: ubuntu-latest

    steps:
      - name: Publish release overview
        run: |
          {
            echo "## Release Automation"
            if [ -n "${{ needs.update-winget.outputs.pull_request_url }}" ]; then
              echo
              echo "- WinGet PR: ${{ needs.update-winget.outputs.pull_request_url }}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
