name: "🧪 CI"

on:
  push:
    branches: [main]
    tags:
      - 'v*'
    paths-ignore:
      - 'docs/**'
      - 'AGENTS.md'
      - 'README.md'
      - 'DESIGN.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'AGENTS.md'
      - 'README.md'
      - 'DESIGN.md'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: "✅ Check (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: "📥 Check out repository"
        uses: actions/checkout@v6

      - name: "🦀 Install Rust toolchain"
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: "🐧 Install Linux build dependencies"
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfontconfig1-dev

      - name: "⚡ Restore Rust cache"
        uses: Swatinem/rust-cache@v2

      - name: "🎨 Check formatting"
        run: cargo fmt --check

      - name: "🔎 Check compilation"
        run: cargo check

      - name: "📎 Lint"
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: "🧪 Test"
        run: cargo test

  desktop-check:
    name: "🖥️ Desktop Check"
    runs-on: macos-latest

    steps:
      - name: "📥 Check out repository"
        uses: actions/checkout@v6

      - name: "🦀 Install Rust toolchain"
        uses: dtolnay/rust-toolchain@stable

      - name: "⚡ Restore Rust cache"
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            desktop/src-tauri -> target

      - name: "📦 Set up pnpm"
        uses: pnpm/action-setup@v5
        with:
          version: 10.33.2
          run_install: false

      - name: "🟢 Set up Node.js"
        uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: pnpm
          cache-dependency-path: desktop/pnpm-lock.yaml

      - name: "📦 Install desktop dependencies"
        working-directory: desktop
        run: pnpm install --frozen-lockfile

      - name: "🔎 Check desktop frontend"
        working-directory: desktop
        run: pnpm run check

      - name: "🏗️ Build desktop frontend"
        working-directory: desktop
        run: pnpm run build

      - name: "🔎 Check desktop shell"
        working-directory: desktop/src-tauri
        run: cargo check

  release-version:
    name: "🏷️ Release Version"
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: "📥 Check out repository"
        uses: actions/checkout@v6

      - name: "🏷️ Validate release metadata"
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          ROOT_VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)
          DESKTOP_CARGO_VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' desktop/src-tauri/Cargo.toml | head -n 1)
          DESKTOP_PACKAGE_VERSION=$(python3 -c 'import json; print(json.load(open("desktop/package.json"))["version"])')
          TAURI_VERSION=$(python3 -c 'import json; print(json.load(open("desktop/src-tauri/tauri.conf.json"))["version"])')

          echo "Tag version: ${TAG_VERSION}"
          echo "Root Cargo version: ${ROOT_VERSION}"
          echo "Desktop Cargo version: ${DESKTOP_CARGO_VERSION}"
          echo "Desktop package version: ${DESKTOP_PACKAGE_VERSION}"
          echo "Tauri config version: ${TAURI_VERSION}"

          if [ "${ROOT_VERSION}" != "${TAG_VERSION}" ]; then
            echo "Root Cargo.toml version must match ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

          if [ "${DESKTOP_CARGO_VERSION}" != "${TAG_VERSION}" ]; then
            echo "desktop/src-tauri/Cargo.toml version must match ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

          if [ "${DESKTOP_PACKAGE_VERSION}" != "${TAG_VERSION}" ]; then
            echo "desktop/package.json version must match ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

          if [ "${TAURI_VERSION}" != "${TAG_VERSION}" ]; then
            echo "desktop/src-tauri/tauri.conf.json version must match ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

  build:
    name: "📦 Build (${{ matrix.artifact }})"
    needs: [check, desktop-check, release-version]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: tokenuse-linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            artifact: tokenuse-linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: tokenuse-darwin-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: tokenuse-darwin-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: tokenuse-windows-amd64.exe

    steps:
      - name: "📥 Check out repository"
        uses: actions/checkout@v6

      - name: "🦀 Install Rust toolchain"
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: "🐧 Install Linux build dependencies"
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfontconfig1-dev

      - name: "⚡ Restore Rust cache"
        uses: Swatinem/rust-cache@v2

      - name: "🏗️ Build release binary"
        run: cargo build --release --target ${{ matrix.target }}

      - name: "🏷️ Rename binary (Unix)"
        if: matrix.os != 'windows-latest'
        run: cp target/${{ matrix.target }}/release/tokenuse ${{ matrix.artifact }}

      - name: "🏷️ Rename binary (Windows)"
        if: matrix.os == 'windows-latest'
        run: cp target/${{ matrix.target }}/release/tokenuse.exe ${{ matrix.artifact }}

      - name: "🔐 Generate checksum (Unix)"
        if: matrix.os != 'windows-latest'
        run: shasum -a 256 ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256

      - name: "🔐 Generate checksum (Windows)"
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $hash = (Get-FileHash -Algorithm SHA256 ${{ matrix.artifact }}).Hash.ToLower()
          "$hash  ${{ matrix.artifact }}" | Out-File -Encoding ascii ${{ matrix.artifact }}.sha256

      - name: "⬆️ Upload artifact"
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.sha256

  desktop-build:
    name: "🖥️ Build Desktop DMG"
    needs: [check, desktop-check, release-version]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-latest

    env:
      DESKTOP_DMG: tokenuse-desktop-macos-universal.dmg

    steps:
      - name: "📥 Check out repository"
        uses: actions/checkout@v6

      - name: "🦀 Install Rust toolchain"
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: "⚡ Restore Rust cache"
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            desktop/src-tauri -> target

      - name: "📦 Set up pnpm"
        uses: pnpm/action-setup@v5
        with:
          version: 10.33.2
          run_install: false

      - name: "🟢 Set up Node.js"
        uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: pnpm
          cache-dependency-path: desktop/pnpm-lock.yaml

      - name: "📦 Install desktop dependencies"
        working-directory: desktop
        run: pnpm install --frozen-lockfile

      - name: "🍎 Import Apple Developer certificate"
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH="${RUNNER_TEMP}/certificate.p12"
          KEYCHAIN_PATH="${RUNNER_TEMP}/tokenuse-signing.keychain-db"

          printf '%s' "${APPLE_CERTIFICATE}" | base64 --decode > "${CERTIFICATE_PATH}"
          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security import "${CERTIFICATE_PATH}" -k "${KEYCHAIN_PATH}" -P "${APPLE_CERTIFICATE_PASSWORD}" -T /usr/bin/codesign
          security list-keychains -d user -s "${KEYCHAIN_PATH}" $(security list-keychains -d user | tr -d '"')
          security default-keychain -s "${KEYCHAIN_PATH}"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"

          IDENTITIES=$(security find-identity -v -p codesigning "${KEYCHAIN_PATH}" || true)
          printf '%s\n' "${IDENTITIES}"
          CERT_ID=$(printf '%s\n' "${IDENTITIES}" | sed -n 's/.*"\(Developer ID Application:.*\)".*/\1/p' | head -n 1)

          if [ -z "${CERT_ID}" ]; then
            echo "No Developer ID Application signing identity was found in the imported certificate." >&2
            if printf '%s\n' "${IDENTITIES}" | grep -q '"Apple Distribution:'; then
              echo "The imported certificate is an Apple Distribution certificate, which is for App Store distribution." >&2
              echo "Direct-download notarized DMGs must be signed with a Developer ID Application certificate." >&2
            fi
            if printf '%s\n' "${IDENTITIES}" | grep -q '"Developer ID Installer:'; then
              echo "The imported certificate is a Developer ID Installer certificate, which is for signing .pkg installers." >&2
              echo "Tauri must codesign the .app bundle with a Developer ID Application certificate before it creates the DMG." >&2
            fi
            echo "Create a Developer ID Application certificate, then export it from Keychain Access > My Certificates so the .p12 includes its private key." >&2
            exit 1
          fi

          echo "APPLE_SIGNING_IDENTITY=${CERT_ID}" >> "$GITHUB_ENV"
          echo "APPLE_KEYCHAIN_PATH=${KEYCHAIN_PATH}" >> "$GITHUB_ENV"

      - name: "🍎 Write App Store Connect API key"
        env:
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
        run: |
          API_KEY_PATH="${RUNNER_TEMP}/AuthKey_${{ secrets.APPLE_API_KEY }}.p8"
          printf '%s' "${APPLE_API_PRIVATE_KEY}" > "${API_KEY_PATH}"
          echo "APPLE_API_KEY_PATH=${API_KEY_PATH}" >> "$GITHUB_ENV"

      - name: "🏗️ Build notarized desktop DMG"
        working-directory: desktop
        env:
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
        run: pnpm tauri build --target universal-apple-darwin --bundles dmg --ci

      - name: "🔐 Verify notarized DMG"
        working-directory: desktop
        run: |
          DMG=$(find src-tauri/target/universal-apple-darwin/release/bundle/dmg -name '*.dmg' -type f | head -n 1)
          if [ -z "${DMG}" ]; then
            echo "No desktop DMG was produced" >&2
            exit 1
          fi

          APP="src-tauri/target/universal-apple-darwin/release/bundle/macos/Token Use.app"
          codesign --verify --deep --strict --verbose=2 "${APP}"
          xcrun stapler validate "${DMG}"
          spctl -a -vv -t open --context context:primary-signature "${DMG}"

      - name: "🏷️ Normalize desktop DMG"
        working-directory: desktop
        run: |
          DMG=$(find src-tauri/target/universal-apple-darwin/release/bundle/dmg -name '*.dmg' -type f | head -n 1)
          cp "${DMG}" "../${DESKTOP_DMG}"
          cd ..
          shasum -a 256 "${DESKTOP_DMG}" > "${DESKTOP_DMG}.sha256"

      - name: "⬆️ Upload desktop artifact"
        uses: actions/upload-artifact@v6
        with:
          name: tokenuse-desktop-macos-universal
          path: |
            ${{ env.DESKTOP_DMG }}
            ${{ env.DESKTOP_DMG }}.sha256

  release:
    name: "🚀 Release"
    needs: [build, desktop-build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: "📦 Download all artifacts"
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: "🗂️ Collect release files"
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
          ls -la release/

      - name: "🚀 Create GitHub Release"
        uses: softprops/action-gh-release@v3
        with:
          files: release/*
          draft: false
          prerelease: false
          generate_release_notes: true

  update-tap:
    name: "🍺 Update Homebrew Tap"
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    uses: ./.github/workflows/update-tap.yml
    with:
      release_tag: ${{ github.ref_name }}
    secrets: inherit
